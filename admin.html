<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TriDDS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f7fa;--card:#fff;--bd:#e5e7eb;--tx:#111827;--tx2:#6b7280;--blue:#1a56db;--eco:#059669;--hors:#d97706;--int:#dc2626;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);padding:0}
.container{max-width:800px;margin:0 auto;padding:16px}
h1{font-size:24px;font-weight:900;margin-bottom:4px}
.sub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);margin-bottom:4px}
input,select{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
input:focus,select:focus{border-color:var(--blue)}
.btn{display:inline-flex;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer;align-items:center;gap:6px}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:#fef2f2;color:var(--int);border:1px solid #fecaca}
.btn-green{background:#ecfdf5;color:var(--eco);border:1px solid #86efac}
.btn-ghost{background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}
.btn:hover{opacity:.9}
.row{display:flex;gap:10px}
.row>*{flex:1}
.badge{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800}
.b-pro{background:#dbeafe;color:#1e40af}
.b-ent{background:#f5f3ff;color:#6d28d9}
.b-free{background:#f0f0f5;color:var(--tx2)}
.b-active{background:#ecfdf5;color:var(--eco)}
.b-inactive{background:#fef2f2;color:var(--int)}
.site-card{border-left:4px solid var(--eco)}
.site-card.inactive{border-left-color:var(--int);opacity:.7}
.agents{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.agent-tag{font-size:10px;background:var(--bg);padding:2px 8px;border-radius:4px;color:var(--tx2)}
.stats{display:flex;gap:12px;margin-bottom:16px}
.stat{flex:1;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:900;color:var(--blue)}
.stat .lab{font-size:11px;color:var(--tx2);margin-top:2px}
#login-panel{max-width:400px;margin:80px auto;text-align:center}
.hidden{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;display:none}
</style>
</head>
<body>

<div id="login-panel">
  <div style="font-size:36px;margin-bottom:12px">🔐</div>
  <h1>TriDDS Admin</h1>
  <p class="sub">Gestion des accès et des sites</p>
  <div class="card">
    <div class="lbl">Clé administrateur</div>
    <input id="in-key" type="password" placeholder="Entrez votre clé admin...">
    <button id="btn-auth" class="btn btn-blue" style="width:100%;justify-content:center">Se connecter</button>
    <div id="auth-err" style="color:var(--int);font-size:12px;margin-top:8px;display:none"></div>
  </div>
</div>

<div id="main-panel" class="hidden">
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h1>🔐 TriDDS Admin</h1>
      <button id="btn-logout" class="btn btn-ghost" style="font-size:11px">Déconnexion</button>
    </div>
    <p class="sub">Gestion des accès, offres et sites</p>

    <!-- Stats -->
    <div class="stats" id="stats-bar">
      <div class="stat"><div class="num" id="st-sites">-</div><div class="lab">Sites actifs</div></div>
      <div class="stat"><div class="num" id="st-brands">-</div><div class="lab">Marques apprises</div></div>
    </div>

    <!-- New site form -->
    <div class="card" style="border:2px dashed var(--bd)">
      <div style="font-weight:700;font-size:15px;margin-bottom:12px">➕ Nouveau site</div>
      <div class="row">
        <div><div class="lbl">Code d'accès</div><input id="new-code" placeholder="FAU-2025-PRO" style="text-transform:uppercase"></div>
        <div><div class="lbl">Plan</div><select id="new-plan"><option value="free">Accès Base</option><option value="pro" selected>Pro Site (39€/mois)</option><option value="multisite">Multi-sites (99€/mois)</option><option value="enterprise">Entreprise (sur devis)</option></select></div>
      </div>
      <div class="lbl">Nom du site</div>
      <input id="new-site" placeholder="Déchetterie de Faulquemont">
      <div class="row">
        <div><div class="lbl">Contact</div><input id="new-contact" placeholder="Email ou téléphone"></div>
        <div><div class="lbl">Notes</div><input id="new-notes" placeholder="Infos complémentaires"></div>
      </div>
      <button id="btn-create" class="btn btn-blue">➕ Créer l'accès</button>
    </div>

    <!-- Sites list -->
    <div style="font-weight:700;font-size:15px;margin:16px 0 8px">📋 Sites enregistrés</div>
    <div id="sites-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
(function(){
var KEY="";
var API_BASE=((window.APP_CONFIG&&window.APP_CONFIG.API_BASE)||"").replace(/\/$/,"");
var API=API_BASE?API_BASE+"/admin":"";

function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(function(){t.style.display="none"},2500)}

function api(action,data){
  if(!API){return Promise.reject(new Error("Backend non configuré dans config.js"))}
  return fetch(API,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+KEY},
    body:JSON.stringify(Object.assign({action:action},data||{}))
  }).then(function(r){return r.json()}).then(function(d){if(d.error)throw new Error(d.error);return d});
}

function loadSites(){
  api("list").then(function(d){
    var sites=d.sites||[];
    document.getElementById("st-sites").textContent=sites.filter(function(s){return s.active}).length;
    if(!sites.length){document.getElementById("sites-list").innerHTML='<div class="card" style="text-align:center;color:var(--tx2)">Aucun site. Créez-en un ci-dessus.</div>';return}
    var h="";
    sites.forEach(function(s){
      var planBadge={free:'<span class="badge b-free">Accès Base</span>',pro:'<span class="badge b-pro">Pro Site</span>',multisite:'<span class="badge b-ent">Multi-sites</span>',enterprise:'<span class="badge b-ent">Entreprise</span>'}[s.plan]||"";
      var statusBadge=s.active?'<span class="badge b-active">Actif</span>':'<span class="badge b-inactive">Désactivé</span>';
      h+='<div class="card site-card'+(s.active?'':' inactive')+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
      h+='<div><div style="font-weight:800;font-size:16px">'+s.site+'</div>';
      h+='<div style="font-size:13px;color:var(--tx2);margin-top:2px;font-family:monospace;letter-spacing:1px">'+s.code+'</div></div>';
      h+='<div style="display:flex;gap:6px">'+planBadge+statusBadge+'</div></div>';
      if(s.contact)h+='<div style="font-size:12px;color:var(--tx2)">📧 '+s.contact+'</div>';
      if(s.notes)h+='<div style="font-size:12px;color:var(--tx2)">📝 '+s.notes+'</div>';
      if(s.agentsList.length>0){h+='<div class="agents">';s.agentsList.forEach(function(a){h+='<span class="agent-tag">👤 '+a.name+' <button onclick="removeAgent(\''+s.code+'\',\''+a.name+'\')" style="color:var(--int);font-weight:700;border:none;background:none;cursor:pointer;font-size:11px;margin-left:2px">✕</button></span>'});h+='</div>'}
      else h+='<div style="font-size:11px;color:var(--tx2);margin-top:4px;font-style:italic">Aucun agent configuré</div>';
      h+='<div style="display:flex;gap:4px;margin-top:6px"><input id="add-agent-'+s.code+'" placeholder="Nom du nouvel agent" style="flex:1;margin:0;padding:6px 10px;font-size:12px"><button onclick="addAgent(\''+s.code+'\')" class="btn btn-green" style="font-size:11px;padding:6px 12px">+ Agent</button></div>';
      h+='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">';
      if(s.active)h+='<button onclick="deactivate(\''+s.code+'\')" class="btn btn-red" style="font-size:11px;padding:6px 14px">🔒 Désactiver</button>';
      else h+='<button onclick="activate(\''+s.code+'\')" class="btn btn-green" style="font-size:11px;padding:6px 14px">🔓 Réactiver</button>';
      h+='<select onchange="changePlan(\''+s.code+'\',this.value)" style="width:auto;margin:0;padding:6px 10px;font-size:11px;font-weight:700"><option value="free"'+(s.plan==="free"?" selected":"")+'>Accès Base</option><option value="pro"'+(s.plan==="pro"?" selected":"")+'>Pro Site</option><option value="multisite"'+(s.plan==="multisite"?" selected":"")+'>Multi-sites</option><option value="enterprise"'+(s.plan==="enterprise"?" selected":"")+'>Entreprise</option></select>';
      h+='<button onclick="deleteSite(\''+s.code+'\')" class="btn btn-ghost" style="font-size:11px;padding:6px 14px;color:var(--int)">🗑️ Supprimer</button>';
      h+='</div></div>';
    });
    document.getElementById("sites-list").innerHTML=h;
  }).catch(function(e){toast("Erreur: "+e.message)});

  api("stats").then(function(d){
    document.getElementById("st-brands").textContent=d.totalBrands||0;
  }).catch(function(){});
}

// Global actions
window.deactivate=function(code){api("update",{code:code,active:false}).then(function(){toast("🔒 "+code+" désactivé");loadSites()}).catch(function(e){toast("Erreur: "+e.message)})};
window.activate=function(code){api("update",{code:code,active:true}).then(function(){toast("🔓 "+code+" réactivé");loadSites()}).catch(function(e){toast("Erreur: "+e.message)})};
window.changePlan=function(code,plan){api("update",{code:code,plan:plan}).then(function(){toast("✅ Plan mis à jour");loadSites()}).catch(function(e){toast("Erreur: "+e.message)})};
window.deleteSite=function(code){if(!confirm("Supprimer définitivement "+code+" ?\nCela supprime aussi la mémoire partagée du site."))return;api("delete",{code:code}).then(function(){toast("🗑️ "+code+" supprimé");loadSites()}).catch(function(e){toast("Erreur: "+e.message)})};
window.addAgent=function(code){var inp=document.getElementById("add-agent-"+code);var name=(inp?inp.value:"").trim();if(!name){toast("Entrez un nom d'agent");return}api("add-agent",{code:code,agent:name}).then(function(){toast("✅ "+name+" ajouté");loadSites()}).catch(function(e){toast("Erreur: "+e.message)})};
window.removeAgent=function(code,name){if(!confirm("Retirer l'agent "+name+" ?"))return;api("remove-agent",{code:code,agent:name}).then(function(){toast("✅ "+name+" retiré");loadSites()}).catch(function(e){toast("Erreur: "+e.message)})};

// Auth
document.getElementById("btn-auth").addEventListener("click",function(){
  KEY=document.getElementById("in-key").value.trim();
  if(!KEY){document.getElementById("auth-err").textContent="Entrez la clé";document.getElementById("auth-err").style.display="block";return}
  api("list").then(function(){
    document.getElementById("login-panel").classList.add("hidden");
    document.getElementById("main-panel").classList.remove("hidden");
    loadSites();
  }).catch(function(e){
    document.getElementById("auth-err").textContent=e.message||"Clé invalide";
    document.getElementById("auth-err").style.display="block";
  });
});
document.getElementById("in-key").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("btn-auth").click()});

// Logout
document.getElementById("btn-logout").addEventListener("click",function(){KEY="";document.getElementById("main-panel").classList.add("hidden");document.getElementById("login-panel").classList.remove("hidden");document.getElementById("in-key").value=""});

// Create site
document.getElementById("btn-create").addEventListener("click",function(){
  var code=document.getElementById("new-code").value.trim();
  var site=document.getElementById("new-site").value.trim();
  var plan=document.getElementById("new-plan").value;
  var contact=document.getElementById("new-contact").value.trim();
  var notes=document.getElementById("new-notes").value.trim();
  if(!code||!site){toast("Code et nom du site requis");return}
  api("create",{code:code,site:site,plan:plan,contact:contact,notes:notes}).then(function(d){
    toast("✅ Site "+d.code+" créé !");
    document.getElementById("new-code").value="";document.getElementById("new-site").value="";
    document.getElementById("new-contact").value="";document.getElementById("new-notes").value="";
    loadSites();
  }).catch(function(e){toast("Erreur: "+e.message)});
});

})();
</script>
</body>
</html>
