<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TriDDS Admin</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f9f6;--card:#fff;--line:#e5e7e2;--tx:#1a1a1a;--tx2:#6b7280;--tx3:#9ca3af;--g:#059669;--g2:#ecfdf5;--g3:#a7f3d0;--o:#d97706;--o2:#fffbeb;--o3:#fde68a;--r:#dc2626;--r2:#fef2f2;--r3:#fecaca;--b:#2563eb;--b2:#eff6ff;--b3:#bfdbfe;--p:#7c3aed;--p2:#f5f3ff;--rd:12px;--sh:0 1px 3px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
.hidden{display:none!important}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#1c1917}
.login-card{width:min(400px,100%);background:var(--card);border-radius:20px;padding:28px}
.login-card h1{font-size:24px;font-weight:800;margin-bottom:4px}
.login-card p{color:var(--tx2);font-size:13px;margin-bottom:20px}
.login-card input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:var(--rd);font:inherit;outline:none;margin-bottom:12px}
.login-card input:focus{border-color:var(--g)}
.login-card button{width:100%;padding:12px;border-radius:var(--rd);background:#1c1917;color:#fff;font:inherit;font-weight:700;border:none;cursor:pointer}
.err{color:var(--r);font-size:12px;font-weight:600;margin-top:8px;display:none}
.topbar{background:#1c1917;display:flex;align-items:center;gap:12px;padding:10px 20px;position:sticky;top:0;z-index:50}
.topbar h2{color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
.gsearch{flex:1;max-width:420px;position:relative}
.gsearch input{width:100%;padding:8px 14px 8px 34px;border-radius:var(--rd);border:none;background:rgba(255,255,255,.1);color:#fff;font:inherit;font-size:13px;outline:none}
.gsearch input::placeholder{color:rgba(255,255,255,.35)}
.gsearch::before{content:"\1F50D";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4}
.topbar-r{margin-left:auto;display:flex;gap:6px}
.topbar-r button{padding:6px 12px;border-radius:var(--rd);border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer}
.nav{display:flex;gap:2px;padding:6px 20px;background:var(--card);border-bottom:1px solid var(--line)}
.nv{padding:10px 18px;border-radius:var(--rd);font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--tx2)}
.nv:hover{background:var(--bg)}
.nv.on{background:var(--bg);color:var(--tx)}
.pn{padding:20px;display:none;max-width:1400px;margin:0 auto}
.pn.on{display:block}
.todo{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.todo-c{border:1px solid var(--line);border-radius:var(--rd);padding:14px;cursor:pointer;display:flex;gap:12px;background:var(--card)}
.todo-c:hover{box-shadow:var(--sh)}
.todo-n{font-size:28px;font-weight:800;line-height:1}
.todo-t{font-size:13px;font-weight:600;margin-bottom:4px}
.todo-s{font-size:11px;color:var(--tx3)}
.bar{height:4px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:6px}
.bar>div{height:100%;border-radius:99px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cd{background:var(--card);border:1px solid var(--line);border-radius:var(--rd);padding:16px}
.cd h3{font-size:15px;font-weight:700;margin-bottom:10px}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.row:last-child{border:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--g)}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.bg{background:var(--g2);color:#065f46}.bo{background:var(--o2);color:#92400e}.br{background:var(--r2);color:#991b1b}.bb{background:var(--b2);color:#1e40af}.bp{background:var(--p2);color:#5b21b6}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 6px;font-size:11px;font-weight:600;color:var(--tx3);border-bottom:1px solid var(--line)}
.tbl td{padding:8px 6px;border-bottom:1px solid var(--line)}
.empty{padding:20px;color:var(--tx3);text-align:center;font-size:13px}
.site-c{border:1px solid var(--line);border-radius:var(--rd);padding:14px;margin-bottom:8px;background:var(--card)}
.site-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.site-n{font-size:15px;font-weight:700}
.code{font-size:11px;color:var(--tx3);font-family:monospace}
.ag{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg);border-radius:8px;margin-top:4px;font-size:12px}
.ag span:first-child{font-weight:600;flex:1}
.mini{font-size:12px;color:var(--tx2)}
.create-f{border:1px solid var(--line);border-radius:var(--rd);padding:16px;background:var(--card)}
.create-f h3{font-size:15px;font-weight:700;margin-bottom:12px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px}
.fg input,.fg select{width:100%;padding:9px 12px;border:1.5px solid var(--line);border-radius:var(--rd);font:inherit;font-size:13px;outline:none;background:var(--card)}
.fg input:focus,.fg select:focus{border-color:var(--g)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hint{font-size:11px;color:var(--tx3);background:var(--bg);border-radius:8px;padding:8px 10px;margin:8px 0;line-height:1.5}
.btn{padding:8px 14px;border-radius:var(--rd);font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:#1c1917;color:#fff}.btn-g{background:var(--g2);color:#065f46;border:1px solid var(--g3)}.btn-r{background:var(--r2);color:var(--r);border:1px solid var(--r3)}.btn-s{background:var(--card);border:1px solid var(--line);color:var(--tx2)}
.btn-sm{padding:5px 10px;font-size:12px}
.pr{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--rd);margin-bottom:4px;cursor:pointer;background:var(--card)}
.pr:hover{border-color:var(--b3);background:var(--b2)}
.pr.sel{border-color:var(--b);background:var(--b2)}
.pr-i{width:40px;height:40px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden;color:var(--tx2)}
.pr-i img{width:100%;height:100%;object-fit:cover}
.pr-n{font-size:13px;font-weight:600}
.pr-m{font-size:11px;color:var(--tx2);margin-top:1px}
.ft{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--tx2)}
.ft.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.ft .ct{font-size:10px;margin-left:3px;opacity:.6}
.dp{border:1px solid var(--line);border-radius:var(--rd);padding:16px;background:var(--card)}
.dp-h{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--line)}
.dp-h-i{width:48px;height:48px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.dp-h-i img{width:100%;height:100%;object-fit:cover}
.dp-t{font-size:16px;font-weight:700}
.dp-s{font-size:12px;color:var(--tx2);margin-top:2px}
.sec{font-size:12px;font-weight:700;color:var(--tx3);margin:14px 0 6px;padding-top:10px;border-top:1px solid var(--line)}
.pg{display:flex;gap:6px;flex-wrap:wrap}
.pg-i{width:56px;height:56px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;border:1px solid var(--line);overflow:hidden}
.pg-i img{width:100%;height:100%;object-fit:cover}
.pg-i.pri{border:2px solid var(--g)}
.pg-i.add{border:1.5px dashed var(--tx3);cursor:pointer;font-size:18px;color:var(--tx3)}
.mem{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--line)}
.mem:last-child{border:none}
.mem span:first-child{font-weight:600;flex:1}
.mem .cnt{font-size:11px;color:var(--tx3)}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kk{background:var(--card);border:1px solid var(--line);border-radius:var(--rd);padding:12px}
.kk-l{font-size:11px;color:var(--tx3);font-weight:600}
.kk-v{font-size:20px;font-weight:800;margin-top:4px}
.session{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.session:last-child{border:none}
.shortcuts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{padding:14px;border-radius:var(--rd);border:1px solid var(--line);background:var(--card);cursor:pointer;text-align:left;font:inherit;font-size:13px;font-weight:600}
.sc:hover{box-shadow:var(--sh)}
.sc div{font-size:20px;margin-bottom:4px}
.dz{border:2px dashed var(--line);border-radius:var(--rd);padding:16px;text-align:center;cursor:pointer;background:var(--bg);margin-bottom:8px}
.dz:hover,.dz.over{border-color:var(--g);background:var(--g2)}
.dz input{display:none}
.dz-p{margin-top:8px;text-align:center}
.dz-p img{max-width:120px;max-height:80px;border-radius:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c1917;color:#fff;padding:10px 18px;border-radius:var(--rd);font-size:13px;font-weight:600;display:none;z-index:999}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<section id="login" class="login">
  <div class="login-card">
    <h1>TriDDS Admin</h1>
    <p>G\u00e9rez vos sites, produits et \u00e9quipes.</p>
    <input id="in-key" type="password" placeholder="Cl\u00e9 administrateur">
    <button id="btn-login">Se connecter</button>
    <div id="login-err" class="err"></div>
  </div>
</section>
<main id="app" class="hidden">
<div class="topbar">
  <h2>TriDDS</h2>
  <div class="gsearch"><input id="gsearch-input" placeholder="Rechercher partout..."></div>
  <div class="topbar-r"><button id="btn-refresh">Actualiser</button><button id="btn-logout">D\u00e9connexion</button></div>
</div>
<div class="nav">
  <button class="nv on" data-tab="dashboard">Tableau de bord</button>
  <button class="nv" data-tab="sites">Sites</button>
  <button class="nv" data-tab="products">Produits</button>
  <button class="nv" data-tab="activity">Activit\u00e9</button>
</div>
<div class="pn on" data-pn="dashboard">
  <div class="todo" id="todo-cards"></div>
  <div class="g2">
    <div class="cd"><h3>Activit\u00e9 r\u00e9cente</h3><div id="dash-activity"></div></div>
    <div class="cd"><h3>Raccourcis</h3><div class="shortcuts">
      <button class="sc" onclick="setTab('sites')"><div>+</div>Cr\u00e9er un site</button>
      <button class="sc" style="border-color:var(--g3);background:var(--g2);color:#065f46" onclick="window.open('./bulk-upload.html')"><div>\ud83d\udcf7</div>Upload photos</button>
      <button class="sc" onclick="setTab('products');setTimeout(function(){setFilter('brands')},100)"><div>\ud83e\udde0</div>Valider marques</button>
      <button class="sc" onclick="setTab('products');setTimeout(function(){setFilter('noimg')},100)"><div>\u26a0</div>Sans photo</button>
    </div></div>
  </div>
</div>
<div class="pn" data-pn="sites">
  <div style="display:grid;grid-template-columns:1fr 340px;gap:12px">
    <div id="sites-list"></div>
    <div class="create-f">
      <h3>+ Nouveau site</h3>
      <div class="fg"><label>Client</label><input id="new-client" placeholder="Nicollin"></div>
      <div class="fg"><label>Nom du site</label><input id="new-site" placeholder="D\u00e9ch\u00e8terie de Nancy"></div>
      <div class="fg2"><div class="fg"><label>Responsable</label><input id="new-principal" placeholder="Pr\u00e9nom Nom"></div><div class="fg"><label>Email</label><input id="new-principal-email" placeholder="email@client.fr"></div></div>
      <div class="hint">Le code est g\u00e9n\u00e9r\u00e9 automatiquement. Le plan est \u00ab Acc\u00e8s Base \u00bb par d\u00e9faut.</div>
      <button id="btn-create" class="btn btn-p" style="width:100%">Cr\u00e9er l\u2019acc\u00e8s</button>
    </div>
  </div>
</div>
<div class="pn" data-pn="products">
  <div style="display:grid;grid-template-columns:1fr 360px;gap:12px">
    <div>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input id="prod-search" placeholder="Rechercher un produit, une marque..." style="flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:var(--rd);font:inherit;font-size:13px;outline:none"><select id="prod-site-filter" style="width:140px;padding:9px;border:1.5px solid var(--line);border-radius:var(--rd);font-size:12px"><option value="">Tous</option></select></div>
      <div id="prod-filters" style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap"></div>
      <div id="prod-list" style="max-height:70vh;overflow-y:auto"></div>
    </div>
    <div id="prod-detail"><div class="dp" style="text-align:center;padding:40px;color:var(--tx3)">S\u00e9lectionnez un produit</div></div>
  </div>
</div>
<div class="pn" data-pn="activity">
  <div class="krow" id="act-kpis"></div>
  <div class="g2">
    <div class="cd"><h3>Ventes</h3><div id="sales-full"></div></div>
    <div class="cd"><h3>Sessions actives</h3><div id="sessions-full"></div></div>
  </div>
</div>
</main>
<div id="toast" class="toast"></div>
<script src="config.js"></script>
<script src="data.js"></script>
<script>
(function(){
let KEY='';
let state={dashboard:null,catalog:{sites:[],items:[]},knowledge:{sites:[],items:[]}};
let imgState={items:[]};
let selProd=null;
let prodFilter='all';
const API_BASE=((window.APP_CONFIG&&window.APP_CONFIG.API_BASE)||'').replace(/\/$/,'');
const API=API_BASE?API_BASE+'/admin':'';
const DB=window.TRIDDS_DB||[];
const $=id=>document.getElementById(id);
const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function dt(v){if(!v)return'\u2014';try{return new Date(v).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return v}}
function euro(v){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(Number(v||0))}
function api(action,data){return fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify(Object.assign({action},data||{}))}).then(async r=>{const t=await r.text();let d={};try{d=t?JSON.parse(t):{}}catch(e){d={error:t||('HTTP '+r.status)}}if(!r.ok||d.error)throw new Error(d.error||('HTTP '+r.status));return d})}
function planBadge(p){return{free:'<span class="badge bg">Base</span>',pro:'<span class="badge bb">Pro</span>',multisite:'<span class="badge bp">Multi</span>',enterprise:'<span class="badge bp">Ent.</span>'}[p]||''}
function setTab(name){document.querySelectorAll('.nv').forEach(b=>b.classList.toggle('on',b.dataset.tab===name));document.querySelectorAll('[data-pn]').forEach(p=>p.classList.toggle('on',p.dataset.pn===name));window.scrollTo({top:0})}
window.setTab=setTab;
window.setFilter=function(f){prodFilter=f;renderProducts()};

async function loadAll(){
  const[dash,cat,kn]=await Promise.all([api('dashboard'),api('catalog-admin-list'),api('knowledge-admin-list')]);
  state.dashboard=dash;state.catalog=cat;state.knowledge=kn;
  await loadImages();
  renderAll();
}
async function loadImages(){
  const sites=state.dashboard?state.dashboard.sites:[];const all=[];
  try{const r=await fetch(API_BASE+'/public-images');const d=await r.json();if(d&&d.items)d.items.forEach(i=>{i._site='Global';all.push(i)})}catch(e){}
  for(const s of sites){try{const r=await fetch(API_BASE+'/product-images',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:s.code,action:'list-all'})});const d=await r.json();if(d&&d.items)d.items.forEach(i=>{i._site=s.site;i._code=s.code;all.push(i)})}catch(e){}}
  imgState.items=all;
}
function renderAll(){renderDashboard();renderSites();renderProducts();renderActivity()}

function renderDashboard(){
  const s=state.dashboard?.stats||{};
  const total=DB.length;
  const withImg=new Set(imgState.items.map(i=>(i.productName||'').toLowerCase().trim())).size;
  const noImg=total-withImg;
  const pct=Math.round(withImg/total*100);
  const brands=(state.knowledge?.items||[]).length;
  $('todo-cards').innerHTML=
    '<div class="todo-c" onclick="setTab(\'products\');setTimeout(function(){setFilter(\'noimg\')},100)" style="border-color:'+(noImg>0?'var(--o3)':'var(--g3)')+'"><div><div class="todo-n" style="color:'+(noImg>0?'var(--o)':'var(--g)')+'">'+noImg+'</div><div style="font-size:11px;color:var(--tx3)">sur '+total+'</div></div><div style="flex:1"><div class="todo-t">Produits sans photo</div><div class="bar"><div style="width:'+pct+'%;background:var(--g)"></div></div><div class="todo-s">'+pct+'% couvert</div></div></div>'+
    '<div class="todo-c" onclick="setTab(\'products\');setTimeout(function(){setFilter(\'brands\')},100)"><div><div class="todo-n">'+brands+'</div></div><div style="flex:1"><div class="todo-t">Marques apprises</div><div class="todo-s">par les agents</div></div></div>'+
    '<div class="todo-c" onclick="setTab(\'sites\')"><div><div class="todo-n" style="color:var(--g)">'+(s.activeSites||0)+'</div></div><div style="flex:1"><div class="todo-t">Sites actifs</div><div class="todo-s">'+(s.activeSessions||0)+' agents</div></div></div>';
  const sess=(state.dashboard?.sessions||[]).slice(0,5);
  let ah='';sess.forEach(s=>{ah+='<div class="row"><div class="dot dot-g"></div><span style="font-weight:600;flex:1">'+esc(s.agent)+'</span><span class="mini">'+esc(s.site)+'</span><span class="mini">'+dt(s.lastSeenAt)+'</span></div>'});
  $('dash-activity').innerHTML=ah||'<div class="empty">Aucune activit\u00e9</div>';
}

function renderSites(){
  const sites=state.dashboard?.sites||[];
  if(!sites.length){$('sites-list').innerHTML='<div class="empty">Aucun site</div>';return}
  let h='';
  sites.forEach(s=>{
    h+='<div class="site-c"><div class="site-h"><div><div class="site-n">'+esc(s.site)+'</div><div class="code">'+esc(s.code)+'</div></div><div style="display:flex;gap:4px">'+planBadge(s.plan)+'<span class="badge '+(s.active?'bg':'br')+'">'+(s.active?'Actif':'Inactif')+'</span></div></div>';
    if(s.client)h+='<div class="mini">'+esc(s.client)+(s.principalEmail?' \u00b7 '+esc(s.principalEmail):'')+'</div>';
    (s.agentsList||[]).forEach(a=>{
      h+='<div class="ag"><span>'+esc(a.name)+'</span><span class="badge '+(a.role==='responsable'?'bp':'bg')+'" style="font-size:10px">'+(a.role==='responsable'?'Resp.':'Agent')+'</span><select class="js-role-select" data-code="'+esc(s.code)+'" data-agent="'+esc(a.name)+'" style="width:auto;padding:3px 6px;font-size:11px;border:1px solid var(--line);border-radius:6px"><option value="responsable"'+(a.role==='responsable'?' selected':'')+'>Responsable</option><option value="agent"'+((a.role||'agent')==='agent'?' selected':'')+'>Agent</option></select><button class="btn btn-r btn-sm js-site-action" data-action="remove-agent" data-code="'+esc(s.code)+'" data-agent="'+esc(a.name)+'">\u00d7</button></div>';
    });
    h+='<div style="display:flex;gap:6px;margin-top:8px"><input id="add-agent-'+esc(s.code)+'" placeholder="Nouveau profil" style="flex:1;padding:6px 10px;font-size:12px;border:1px solid var(--line);border-radius:8px"><button class="btn btn-g btn-sm js-site-action" data-action="add-agent" data-code="'+esc(s.code)+'">+ Ajouter</button></div>';
    h+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap"><select class="js-plan-select" data-code="'+esc(s.code)+'" style="padding:5px 8px;font-size:11px;border:1px solid var(--line);border-radius:6px"><option value="free"'+(s.plan==='free'?' selected':'')+'>Base</option><option value="pro"'+(s.plan==='pro'?' selected':'')+'>Pro</option><option value="multisite"'+(s.plan==='multisite'?' selected':'')+'>Multi</option><option value="enterprise"'+(s.plan==='enterprise'?' selected':'')+'>Ent.</option></select>';
    h+=s.active?'<button class="btn btn-r btn-sm js-site-action" data-action="deactivate" data-code="'+esc(s.code)+'">D\u00e9sactiver</button>':'<button class="btn btn-g btn-sm js-site-action" data-action="activate" data-code="'+esc(s.code)+'">R\u00e9activer</button>';
    h+='<button class="btn btn-s btn-sm js-site-action" data-action="delete-site" data-code="'+esc(s.code)+'">Supprimer</button></div></div>';
  });
  $('sites-list').innerHTML=h;
  $('prod-site-filter').innerHTML='<option value="">Tous</option>'+sites.map(s=>'<option value="'+esc(s.code)+'">'+esc(s.site)+'</option>').join('');
}

function getImgsFor(name){return imgState.items.filter(i=>(i.productName||'').toLowerCase().trim()===name.toLowerCase().trim())}
function getBrandsFor(name){return(state.knowledge?.items||[]).filter(i=>(i.p||'').toLowerCase().trim()===name.toLowerCase().trim())}
function getCatFor(name){return(state.catalog?.items||[]).filter(i=>(i.n||'').toLowerCase().trim()===name.toLowerCase().trim())}

function renderProducts(){
  const q=($('prod-search')?.value||'').toLowerCase();
  let prods=DB.map(p=>({name:p[0],flux:p[2],cat:p[3]||'',seuil:p[5]||''}));
  (state.catalog?.items||[]).forEach(ci=>{if(!prods.find(p=>p.name.toLowerCase()===ci.n.toLowerCase()))prods.push({name:ci.n,flux:ci.f||'H',cat:ci.x||'',custom:true})});
  const withImg=new Set(imgState.items.map(i=>(i.productName||'').toLowerCase().trim()));
  const noImgC=prods.filter(p=>!withImg.has(p.name.toLowerCase().trim())).length;
  const allBrands=(state.knowledge?.items||[]);
  $('prod-filters').innerHTML=
    '<button class="ft '+(prodFilter==='all'?'on':'')+'" onclick="setFilter(\'all\')">Tous<span class="ct">'+prods.length+'</span></button>'+
    '<button class="ft '+(prodFilter==='noimg'?'on':'')+'" onclick="setFilter(\'noimg\')" '+(noImgC>0?'style="color:var(--o)"':'')+'>Sans photo<span class="ct">'+noImgC+'</span></button>'+
    '<button class="ft '+(prodFilter==='hasimg'?'on':'')+'" onclick="setFilter(\'hasimg\')">Avec photo<span class="ct">'+(prods.length-noImgC)+'</span></button>'+
    '<button class="ft '+(prodFilter==='brands'?'on':'')+'" onclick="setFilter(\'brands\')">Marques IA<span class="ct">'+allBrands.length+'</span></button>';
  if(prodFilter==='noimg')prods=prods.filter(p=>!withImg.has(p.name.toLowerCase().trim()));
  if(prodFilter==='hasimg')prods=prods.filter(p=>withImg.has(p.name.toLowerCase().trim()));
  if(prodFilter==='brands'){renderBrands(q);return}
  if(q)prods=prods.filter(p=>p.name.toLowerCase().includes(q)||(p.cat||'').toLowerCase().includes(q));
  prods=prods.slice(0,100);
  let h='';
  prods.forEach(p=>{
    const imgs=getImgsFor(p.name);const brands=getBrandsFor(p.name);
    const fl=p.flux==='E'?'<span class="badge bg" style="font-size:10px">E</span>':p.flux==='C'?'<span class="badge br" style="font-size:10px">!</span>':'<span class="badge bo" style="font-size:10px">H</span>';
    const img0=imgs.length?imgs[0]:null;const isSel=selProd===p.name;
    h+='<div class="pr '+(isSel?'sel':'')+'" onclick="selectProduct(\''+p.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\')">';
    h+='<div class="pr-i">'+(img0&&img0.url?'<img src="'+esc(img0.url)+'" loading="lazy">':p.name.charAt(0))+'</div>';
    h+='<div style="flex:1;min-width:0"><div class="pr-n">'+esc(p.name)+'</div><div class="pr-m" '+(!imgs.length?'style="color:var(--o)"':'')+'>'+esc(p.cat)+(imgs.length?' \u00b7 '+imgs.length+' photo'+(imgs.length>1?'s':''):'')+(brands.length?' \u00b7 '+brands.length+' marque'+(brands.length>1?'s':''):'')+'</div></div>';
    h+=fl+'</div>';
  });
  $('prod-list').innerHTML=h||'<div class="empty">Aucun produit</div>';
}
function renderBrands(q){
  let brands=(state.knowledge?.items||[]);
  if(q)brands=brands.filter(b=>(b.brand||'').toLowerCase().includes(q)||(b.p||'').toLowerCase().includes(q));
  brands.sort((a,b)=>(b.n||0)-(a.n||0));
  let h='';
  brands.forEach(b=>{
    h+='<div class="pr" onclick="selectProduct(\''+esc((b.p||b.brand).replace(/'/g,"\\'"))+'\')"><div class="pr-i">\ud83e\udde0</div><div style="flex:1;min-width:0"><div class="pr-n">'+esc(b.brand)+'</div><div class="pr-m">'+esc(b.p||'\u2014')+' \u00b7 '+esc(b.site||'')+' \u00b7 vu '+(b.n||0)+'x</div></div></div>';
  });
  $('prod-list').innerHTML=h||'<div class="empty">Aucune marque</div>';
}
window.selectProduct=function(name){selProd=name;renderProducts();renderDetail(name)};
function renderDetail(name){
  const imgs=getImgsFor(name);const brands=getBrandsFor(name);const cats=getCatFor(name);
  const db=DB.find(p=>p[0]===name);
  const cat=db?db[3]:'';const flux=db?db[2]:'H';const seuil=db?db[5]:'';const consigne=db?db[4]:'';
  const img0=imgs.length?imgs[0]:null;
  let h='<div class="dp"><div class="dp-h"><div class="dp-h-i">'+(img0&&img0.url?'<img src="'+esc(img0.url)+'">':name.charAt(0))+'</div><div><div class="dp-t">'+esc(name)+'</div><div class="dp-s">'+esc(cat)+' \u00b7 <span class="badge '+(flux==='E'?'bg':'bo')+'" style="font-size:10px">'+(flux==='E'?'EcoDDS':'Hors')+'</span>'+(seuil?' \u00b7 '+esc(seuil):'')+'</div></div></div>';
  if(consigne)h+='<div style="padding:8px 10px;border-radius:8px;background:var(--r2);color:var(--r);font-size:12px;margin-bottom:10px;border:1px solid var(--r3)">\u26d4 '+esc(consigne)+'</div>';
  h+='<div class="sec">Photos EcoDDS</div><div class="pg">';
  imgs.filter(i=>i.imageFlux==='E'||(!i.imageFlux)).forEach(i=>{h+='<div class="pg-i '+(i.isPrimary?'pri':'')+'">'+(i.url?'<img src="'+esc(i.url)+'">':'?')+'</div>'});
  h+='<div class="pg-i add" onclick="openImgUp(\''+esc(name.replace(/'/g,"\\'"))+'\',\'E\')">+</div></div>';
  h+='<div class="sec">Photos Hors EcoDDS</div><div class="pg">';
  imgs.filter(i=>i.imageFlux==='H').forEach(i=>{h+='<div class="pg-i '+(i.isPrimary?'pri':'')+'">'+(i.url?'<img src="'+esc(i.url)+'">':'?')+'</div>'});
  h+='<div class="pg-i add" onclick="openImgUp(\''+esc(name.replace(/'/g,"\\'"))+'\',\'H\')">+</div></div>';
  h+='<div class="sec">Marques apprises ('+brands.length+')</div>';
  if(brands.length){brands.forEach(b=>{h+='<div class="mem"><span>'+esc(b.brand)+'</span><span class="cnt">vu '+(b.n||0)+'x \u00b7 '+esc(b.site||'')+'</span></div>'})}
  else h+='<div class="mini" style="padding:6px 0">Aucune</div>';
  h+='<div class="sec">Fiches ('+cats.length+')</div>';
  if(cats.length){cats.forEach(ci=>{h+='<div class="mem"><span>'+esc(ci.site||ci.code)+'</span><span class="cnt">'+esc(ci.x||'')+' \u00b7 '+(ci.f==='E'?'EcoDDS':'Hors')+'</span></div>'})}
  else h+='<div class="mini" style="padding:6px 0">Base officielle</div>';
  h+='</div>';
  $('prod-detail').innerHTML=h;
}
window.openImgUp=function(name,flux){
  let pend=null;
  $('prod-detail').innerHTML='<div class="dp"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px">Photo \u2014 '+esc(name)+'</h3><div class="mini" style="margin-bottom:10px">'+(flux==='E'?'EcoDDS':'Hors EcoDDS')+'</div><div class="dz" id="dp-dz"><input type="file" id="dp-file" accept="image/jpeg,image/png,image/webp"><div>\ud83d\udcf7 Cliquer ou glisser</div><div style="font-size:11px;color:var(--tx3)">JPG, PNG, WebP</div></div><div class="dz-p" id="dp-prev"></div><div style="display:flex;gap:8px"><button class="btn btn-p" id="dp-upload" disabled style="flex:1">Uploader</button><button class="btn btn-s" onclick="renderDetail(\''+esc(name.replace(/'/g,"\\'"))+'\')">Annuler</button></div></div>';
  const dz=$('dp-dz'),fi=$('dp-file');
  dz.onclick=()=>fi.click();
  dz.ondragover=e=>{e.preventDefault();dz.classList.add('over')};
  dz.ondragleave=()=>dz.classList.remove('over');
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');proc(e.dataTransfer.files[0])};
  fi.onchange=()=>proc(fi.files[0]);
  function proc(file){if(!file||!file.type.match(/^image\/(jpeg|png|webp)$/))return;pend=file;const r=new FileReader();r.onload=e=>{$('dp-prev').innerHTML='<img src="'+e.target.result+'" style="max-width:160px;border-radius:8px">';$('dp-upload').disabled=false};r.readAsDataURL(file)}
  $('dp-upload').onclick=async()=>{if(!pend)return;$('dp-upload').disabled=true;$('dp-upload').textContent='Envoi...';try{const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(pend)});const resp=await fetch(API_BASE+'/product-images',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:'_GLOBAL',action:'save',agent:'superadmin',imageData:b64,imageMime:pend.type,item:{productName:name,alt:name,source:'admin',isPrimary:false,order:0,imageFlux:flux}})});const d=await resp.json();if(d.error)throw new Error(d.error);toast('Photo ajout\u00e9e');await loadImages();renderDetail(name);renderProducts()}catch(e){toast('Erreur: '+e.message);$('dp-upload').disabled=false;$('dp-upload').textContent='Uploader'}};
};

function renderActivity(){
  const s=state.dashboard?.stats||{};
  $('act-kpis').innerHTML='<div class="kk"><div class="kk-l">Ventes</div><div class="kk-v">'+(s.totalSales||0)+'</div></div><div class="kk"><div class="kk-l">MRR</div><div class="kk-v">'+euro(s.mrr||0)+'</div></div><div class="kk"><div class="kk-l">Sessions</div><div class="kk-v">'+(s.activeSessions||0)+'</div></div><div class="kk"><div class="kk-l">Marques</div><div class="kk-v">'+(s.totalBrands||0)+'</div></div>';
  const sales=state.dashboard?.sales||[];
  if(!sales.length){$('sales-full').innerHTML='<div class="empty">Aucune vente</div>'}
  else{let h='<table class="tbl"><thead><tr><th>Date</th><th>Site</th><th>Plan</th><th>Montant</th></tr></thead><tbody>';sales.forEach(s=>h+='<tr><td>'+esc(dt(s.date))+'</td><td style="font-weight:600">'+esc(s.site)+'</td><td>'+planBadge(s.plan)+'</td><td>'+esc(euro(s.amount))+'</td></tr>');h+='</tbody></table>';$('sales-full').innerHTML=h}
  const sess=state.dashboard?.sessions||[];
  if(!sess.length){$('sessions-full').innerHTML='<div class="empty">Aucune session</div>'}
  else{let h='';sess.forEach(s=>h+='<div class="session"><div class="dot dot-g"></div><span style="font-weight:600;flex:1">'+esc(s.agent)+'</span><span class="mini">'+esc(s.site)+' \u00b7 '+esc(s.deviceName||'?')+'</span><span class="mini">'+dt(s.lastSeenAt)+'</span><button class="btn btn-r btn-sm js-site-action" data-action="kick-session" data-code="'+esc(s.code)+'" data-agent="'+esc(s.agent)+'">\u00d7</button></div>');$('sessions-full').innerHTML=h}
}

// Events
$('btn-login').addEventListener('click',()=>{KEY=$('in-key').value.trim();if(!KEY){$('login-err').textContent='Cl\u00e9 requise';$('login-err').style.display='block';return}loadAll().then(()=>{$('login').classList.add('hidden');$('app').classList.remove('hidden')}).catch(e=>{$('login-err').textContent=e.message;$('login-err').style.display='block'})});
$('in-key').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-login').click()});
$('btn-refresh').addEventListener('click',()=>loadAll().catch(e=>toast(e.message)));
$('btn-logout').addEventListener('click',()=>{KEY='';$('app').classList.add('hidden');$('login').classList.remove('hidden');$('in-key').value=''});
document.querySelectorAll('.nv').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
$('prod-search').addEventListener('input',renderProducts);
$('prod-site-filter').addEventListener('change',renderProducts);
$('gsearch-input').addEventListener('input',e=>{const q=e.target.value.trim();if(q.length>=2){setTab('products');$('prod-search').value=q;renderProducts()}});
$('btn-create').addEventListener('click',()=>{
  const client=$('new-client').value.trim(),site=$('new-site').value.trim(),principal=$('new-principal').value.trim(),email=$('new-principal-email').value.trim();
  if(!client||!site){toast('Client et site requis');return}
  const pfx=site.replace(/[^a-zA-Z]/g,'').substring(0,5).toUpperCase()||'SITE';
  const code=pfx+'-'+new Date().getFullYear()+'-'+Math.random().toString(36).substring(2,5).toUpperCase();
  api('create',{code,client,principal,principalEmail:email,site,plan:'free',contact:'',notes:''}).then(()=>{toast('Site cr\u00e9\u00e9 : '+code);$('new-client').value='';$('new-site').value='';$('new-principal').value='';$('new-principal-email').value='';loadAll()}).catch(e=>toast(e.message));
});
document.addEventListener('click',e=>{
  const btn=e.target.closest('.js-site-action');if(!btn)return;
  const a=btn.dataset.action,code=btn.dataset.code,agent=btn.dataset.agent||'';
  if(a==='add-agent'){const name=$('add-agent-'+code)?.value.trim();if(!name){toast('Nom requis');return}api('add-agent',{code,agent:name,role:'agent'}).then(()=>{toast('Ajout\u00e9');loadAll()}).catch(e=>toast(e.message))}
  else if(a==='remove-agent'){if(!confirm('Retirer '+agent+' ?'))return;api('remove-agent',{code,agent}).then(()=>{toast('Retir\u00e9');loadAll()}).catch(e=>toast(e.message))}
  else if(a==='deactivate'){api('update',{code,active:false}).then(()=>{toast('D\u00e9sactiv\u00e9');loadAll()}).catch(e=>toast(e.message))}
  else if(a==='activate'){api('update',{code,active:true}).then(()=>{toast('R\u00e9activ\u00e9');loadAll()}).catch(e=>toast(e.message))}
  else if(a==='delete-site'){if(!confirm('Supprimer '+code+' ?'))return;api('delete',{code}).then(()=>{toast('Supprim\u00e9');loadAll()}).catch(e=>toast(e.message))}
  else if(a==='kick-session'){if(!confirm('D\u00e9connecter '+agent+' ?'))return;api('kick-session',{code,agent}).then(()=>{toast('D\u00e9connect\u00e9');loadAll()}).catch(e=>toast(e.message))}
});
document.addEventListener('change',e=>{
  if(e.target.matches('.js-role-select')){const code=e.target.dataset.code,agent=e.target.dataset.agent,role=e.target.value;if(role==='responsable'&&!confirm(agent+' comme responsable ?')){loadAll();return}api('set-agent-role',{code,agent,role}).then(()=>{toast('R\u00f4le mis \u00e0 jour');loadAll()}).catch(e=>toast(e.message))}
  if(e.target.matches('.js-plan-select')){api('update',{code:e.target.dataset.code,plan:e.target.value}).then(()=>{toast('Plan mis \u00e0 jour');loadAll()}).catch(e=>toast(e.message))}
});
})();
</script>
</body>
