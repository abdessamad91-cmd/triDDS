<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TriDDS — Activation</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
<link rel="manifest" href="./manifest.json"><style>
body{font-family:Arial,sans-serif;background:#f5f7fa;margin:0;color:#111827}.wrap{max-width:760px;margin:0 auto;padding:32px 20px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:24px;box-shadow:0 6px 18px rgba(0,0,0,.05)}h1{margin:0 0 8px;font-size:34px}.sub{color:#6b7280;margin:0 0 18px}.status{padding:12px 14px;border-radius:12px;font-size:14px;margin-bottom:18px}.loading{background:#eff6ff;color:#a31f20;border:1px solid #bfdbfe}.ok{background:#ecfeff;color:#155e75;border:1px solid #a5f3fc}.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-top:12px}.code{font-size:28px;font-weight:800;letter-spacing:1px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}.btn{display:inline-block;padding:12px 16px;border-radius:12px;background:#c22829;color:#fff;text-decoration:none;font-weight:700;border:none;cursor:pointer}.btn.alt{background:#111827}.small{color:#6b7280;font-size:13px}
</style></head><body><div class="wrap"><div class="card"><h1>Activation de votre accès</h1><p class="sub">Nous vérifions votre paiement et préparons votre accès TriDDS.</p><div id="status" class="status loading">Vérification en cours…</div><div id="result" style="display:none"></div><div class="small" id="help">Laissez cette page ouverte quelques secondes.</div></div></div><script>
const API_BASE=(window.APP_CONFIG&&window.APP_CONFIG.API_BASE)||"https://wild-morning-f974.abdessamad91.workers.dev/api";
const statusEl=document.getElementById('status');const resultEl=document.getElementById('result');const helpEl=document.getElementById('help');
function setStatus(text,kind){statusEl.className='status '+kind;statusEl.textContent=text;}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
async function load(){const p=new URLSearchParams(location.search);const sid=p.get('session_id');if(!sid){setStatus('Aucune session Stripe trouvée.','err');helpEl.textContent='Revenez à la page tarifs puis relancez le paiement.';return;}try{const res=await fetch(API_BASE+'/payment-success?session_id='+encodeURIComponent(sid));const data=await res.json();if(!res.ok||!data.ok) throw new Error(data.error||'Paiement non confirmé');setStatus('Paiement confirmé. Votre accès est prêt.','ok');resultEl.style.display='block';const emailNote=data.email&&data.email.sent?'<div style="margin-top:12px"><strong>Email envoyé</strong><br>'+escapeHtml(data.adminEmail||'')+'</div>':(data.email&&data.email.error?'<div style="margin-top:12px;color:#991b1b"><strong>Email non envoyé</strong><br>'+escapeHtml(data.email.error)+'</div>':'');resultEl.innerHTML='<div class="box"><div><strong>Site</strong><br>'+escapeHtml(data.site)+'</div><div style="margin-top:12px"><strong>Plan</strong><br>'+escapeHtml(data.planName)+'</div><div style="margin-top:12px"><strong>Code d\'accès</strong><br><div class="code" id="accessCode">'+escapeHtml(data.code)+'</div></div><div style="margin-top:12px"><strong>Administrateur</strong><br>'+escapeHtml(data.adminName||'')+(data.adminEmail?' — '+escapeHtml(data.adminEmail):'')+'</div>'+emailNote+'</div><div class="actions"><a class="btn" href="./index.html">Ouvrir l\'application</a><button class="btn alt" id="copyBtn">Copier le code</button></div>';helpEl.textContent='Conservez bien ce code pour votre première connexion.';document.getElementById('copyBtn').onclick=async()=>{try{await navigator.clipboard.writeText(data.code);document.getElementById('copyBtn').textContent='Code copié';}catch(e){document.getElementById('copyBtn').textContent='Copie impossible';}};}catch(e){setStatus(e.message||'Erreur d\'activation','err');helpEl.textContent='Si votre paiement est bien passé, revenez sur cette page dans quelques secondes.';}}
load();
</script></body></html>
